<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credits</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #f5f5f5;
      --accent-color: #444444;
      --card-bg: #111111;
    }

    body.light {
      --bg-color: #ffffff;
      --text-color: #000000;
      --accent-color: #222222;
      --card-bg: #f4f4f4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #222;
    }

    h1 {
      font-size: 1.5rem;
    }

    .theme-toggle {
      background: var(--accent-color);
      color: white;
      border: 1px solid #555;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s ease;
    }

    .theme-toggle:hover {
      opacity: 0.85;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #222;
      max-width: 700px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid #222;
    }

    a {
      color: var(--text-color);
      text-decoration: underline;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Credits</h1>
    <button class="theme-toggle" onclick="toggleTheme()">تغيير النمط</button>
  </header>

  <main>
    <div class="card">
      <p>
        Yassin Ahmed Hafez – Website creator and information provider.<br><br>
        Yesmeen Fareed – Information provider and task organizer.<br><br>
        Rahaf Haitham – Information provider and idea contributor.<br><br>
        That’s it, goodbye!
      </p>
    </div>
  </main>

    <footer>
    <a href="index.html">
      <button class="theme-toggle">Main</button>
    </a>
  </footer>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light');
    }
  </script>
</body>
</html>
